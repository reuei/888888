<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>语云科技后台管理</title>
  <style>
    :root {
      --primary: #0052D9;
      --primary-light: #1677FF;
      --primary-bg: #E6F0FF;
      --accent: #FF6A00;
      --text-main: #1D2129;
      --text-secondary: #4E5969;
      --text-tertiary: #86909C;
      --bg-white: #FFFFFF;
      --bg-gray: #F2F3F5;
      --border: #E5E6EB;
      --radius: 8px;
      --shadow: 0 4px 16px rgba(0,0,0,0.08);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
      color: var(--text-main);
      background: var(--bg-gray);
      line-height: 1.6;
    }
    .admin-layout {
      display: flex;
      min-height: 100vh;
    }
    .sidebar-nav {
      width: 240px;
      background: var(--text-main);
      color: #fff;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      overflow-y: auto;
    }
    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar-header .logo-icon {
      width: 32px;
      height: 32px;
      background: var(--primary);
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
    }
    .sidebar-header span {
      font-size: 16px;
      font-weight: 600;
    }
    .nav-menu {
      padding: 12px 0;
    }
    .nav-item {
      display: block;
      padding: 12px 20px;
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      border-left: 3px solid transparent;
    }
    .nav-item:hover, .nav-item.active {
      background: rgba(255,255,255,0.05);
      color: #fff;
      border-left-color: var(--primary);
    }
    .main-content {
      flex: 1;
      margin-left: 240px;
      padding: 24px 32px;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }
    .top-bar h1 {
      font-size: 22px;
      font-weight: 600;
    }
    .user-info {
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 14px;
      color: var(--text-secondary);
    }
    .user-info button {
      background: none;
      border: 1px solid var(--border);
      padding: 6px 14px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
    }
    .user-info button:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    .card {
      background: var(--bg-white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 24px;
    }
    .card h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .form-row {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin-bottom: 16px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 4px;
      font-size: 14px;
      font-family: inherit;
      transition: all 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,82,217,0.1);
    }
    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 20px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary {
      background: var(--primary);
      color: #fff;
    }
    .btn-primary:hover { background: #003bb5; }
    .btn-danger {
      background: #f53f3f;
      color: #fff;
    }
    .btn-danger:hover { background: #d92929; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }
    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .table th, .table td {
      padding: 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }
    .table th {
      font-weight: 600;
      color: var(--text-secondary);
      background: var(--bg-gray);
    }
    .table tr:hover { background: var(--bg-gray); }
    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    .tag-blue { background: var(--primary-bg); color: var(--primary); }
    .tag-green { background: #e8f5e9; color: #2e7d32; }
    .hidden { display: none !important; }
    .alert {
      padding: 12px 16px;
      border-radius: 4px;
      margin-bottom: 16px;
      font-size: 14px;
    }
    .alert-success { background: #e8f5e9; color: #2e7d32; }
    .alert-error { background: #ffebee; color: #c62828; }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 8px;
    }
    .tab {
      padding: 8px 16px;
      font-size: 14px;
      cursor: pointer;
      border-radius: 4px;
      color: var(--text-secondary);
    }
    .tab.active, .tab:hover {
      background: var(--primary-bg);
      color: var(--primary);
    }
    @media (max-width: 768px) {
      .sidebar-nav { width: 200px; }
      .main-content { margin-left: 200px; padding: 16px; }
      .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="admin-layout">
    <!-- 侧边栏 -->
    <aside class="sidebar-nav">
      <div class="sidebar-header">
        <div class="logo-icon">语</div>
        <span>语云科技后台</span>
      </div>
      <nav class="nav-menu">
        <a class="nav-item active" data-page="home">首页配置</a>
        <a class="nav-item" data-page="footer">页脚配置</a>
        <a class="nav-item" data-page="popup">弹窗配置</a>
        <a class="nav-item" data-page="products">产品管理</a>
        <a class="nav-item" data-page="partners">合作伙伴</a>
        <a class="nav-item" data-page="map">地图标记</a>
        <a class="nav-item" data-page="password">修改密码</a>
      </nav>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <div class="top-bar">
        <h1 id="pageTitle">首页配置</h1>
        <div class="user-info">
          <span>管理员</span>
          <button onclick="logout()">退出登录</button>
        </div>
      </div>

      <div id="alertBox"></div>

      <!-- 首页配置 -->
      <div id="page-home">
        <div class="card">
          <h3>轮播图管理</h3>
          <div id="bannersList"></div>
          <button class="btn btn-primary btn-sm" onclick="addBanner()" style="margin-top:12px;">+ 添加轮播图</button>
        </div>
        <div class="card">
          <h3>资质展示管理</h3>
          <div id="certsList"></div>
          <button class="btn btn-primary btn-sm" onclick="addCert()" style="margin-top:12px;">+ 添加资质</button>
        </div>
        <div class="card">
          <h3>产品业务管理</h3>
          <div id="productsList"></div>
          <button class="btn btn-primary btn-sm" onclick="addProduct()" style="margin-top:12px;">+ 添加产品</button>
        </div>
        <button class="btn btn-primary" onclick="saveHome()">保存首页配置</button>
      </div>

      <!-- 页脚配置 -->
      <div id="page-footer" class="hidden">
        <div class="card">
          <h3>页脚信息配置</h3>
          <div class="form-row">
            <div class="form-group">
              <label>销售电话</label>
              <input type="text" id="footerPhoneInput" placeholder="400-800-8451">
            </div>
            <div class="form-group">
              <label>备案号</label>
              <input type="text" id="footerIcpInput" placeholder="京ICP备2024001234号-1">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>备案链接</label>
              <input type="text" id="footerIcpLinkInput" placeholder="https://beian.miit.gov.cn/">
            </div>
            <div class="form-group">
              <label>电子增值服务许可证</label>
              <input type="text" id="footerCertInput" placeholder="电子增值服务许可证：B1-20240001">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>公安网备案号</label>
              <input type="text" id="footerPoliceInput" placeholder="京公网安备 11010502040001号">
            </div>
            <div class="form-group">
              <label>公安网备案链接</label>
              <input type="text" id="footerPoliceLinkInput" placeholder="https://www.beian.gov.cn/">
            </div>
          </div>
          <div class="form-group">
            <label>授权声明</label>
            <textarea id="footerStatementInput" placeholder="语云科技®等是我们（语云科技美国有限公司）在中国的注册授权"></textarea>
          </div>
          <button class="btn btn-primary" onclick="saveFooter()">保存页脚配置</button>
        </div>
      </div>

      <!-- 弹窗配置 -->
      <div id="page-popup" class="hidden">
        <div class="card">
          <h3>公告弹窗配置</h3>
          <div class="form-row">
            <div class="form-group">
              <label>是否启用</label>
              <select id="popupEnabled">
                <option value="true">启用</option>
                <option value="false">禁用</option>
              </select>
            </div>
            <div class="form-group">
              <label>每日仅显示一次</label>
              <select id="popupOncePerDay">
                <option value="true">是</option>
                <option value="false">否</option>
              </select>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>顶栏颜色</label>
              <input type="color" id="popupHeaderColor" value="#0052D9">
            </div>
            <div class="form-group">
              <label>按钮颜色</label>
              <input type="color" id="popupButtonColor" value="#0052D9">
            </div>
          </div>
          <div class="form-group">
            <label>弹窗标题</label>
            <input type="text" id="popupTitle" placeholder="重要通知">
          </div>
          <div class="form-group">
            <label>弹窗内容（支持HTML）</label>
            <textarea id="popupContent" placeholder="请输入弹窗内容"></textarea>
          </div>
          <button class="btn btn-primary" onclick="savePopup()">保存弹窗配置</button>
        </div>
      </div>

      <!-- 产品管理 -->
      <div id="page-products" class="hidden">
        <div class="card">
          <h3>产品列表</h3>
          <div id="adminProductsList"></div>
          <button class="btn btn-primary btn-sm" onclick="addAdminProduct()" style="margin-top:12px;">+ 添加产品</button>
        </div>
        <button class="btn btn-primary" onclick="saveProducts()">保存产品配置</button>
      </div>

      <!-- 合作伙伴 -->
      <div id="page-partners" class="hidden">
        <div class="card">
          <h3>合作伙伴列表</h3>
          <div id="adminPartnersList"></div>
          <button class="btn btn-primary btn-sm" onclick="addAdminPartner()" style="margin-top:12px;">+ 添加合作伙伴</button>
        </div>
        <button class="btn btn-primary" onclick="savePartners()">保存合作伙伴配置</button>
      </div>

      <!-- 地图标记 -->
      <div id="page-map" class="hidden">
        <div class="card">
          <h3>地图标记点</h3>
          <div id="adminMapList"></div>
          <button class="btn btn-primary btn-sm" onclick="addAdminMarker()" style="margin-top:12px;">+ 添加标记点</button>
        </div>
        <button class="btn btn-primary" onclick="saveMap()">保存地图配置</button>
      </div>

      <!-- 修改密码 -->
      <div id="page-password" class="hidden">
        <div class="card">
          <h3>修改管理员密码</h3>
          <div class="form-group">
            <label>旧密码</label>
            <input type="password" id="oldPassword" placeholder="请输入旧密码">
          </div>
          <div class="form-group">
            <label>新密码</label>
            <input type="password" id="newPassword" placeholder="请输入新密码">
          </div>
          <div class="form-group">
            <label>确认新密码</label>
            <input type="password" id="confirmPassword" placeholder="请再次输入新密码">
          </div>
          <button class="btn btn-primary" onclick="changePassword()">修改密码</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    const token = localStorage.getItem('admin_token');
    if (!token) { window.location.href = '/admin/'; }

    async function apiGet(url) {
      const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + token } });
      return res.json();
    }
    async function apiPost(url, data) {
      const res = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify(data)
      });
      return res.json();
    }

    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
      setTimeout(() => box.innerHTML = '', 3000);
    }

    function logout() {
      localStorage.removeItem('admin_token');
      window.location.href = '/admin/';
    }

    // 导航切换
    document.querySelectorAll('.nav-item').forEach(item => {
      item.addEventListener('click', () => {
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        item.classList.add('active');
        const page = item.dataset.page;
        document.querySelectorAll('[id^="page-"]').forEach(p => p.classList.add('hidden'));
        document.getElementById('page-' + page).classList.remove('hidden');
        document.getElementById('pageTitle').textContent = item.textContent;
        if (page === 'home') loadHome();
        if (page === 'footer') loadFooter();
        if (page === 'popup') loadPopup();
        if (page === 'products') loadProducts();
        if (page === 'partners') loadPartners();
        if (page === 'map') loadMap();
      });
    });

    // ===== 首页配置 =====
    let homeData = { banners: [], certificates: [], products: [] };

    async function loadHome() {
      const res = await apiGet('/api/config/home');
      if (res.success) homeData = res.data;
      renderBanners();
      renderCerts();
      renderProducts();
    }

    function renderBanners() {
      const el = document.getElementById('bannersList');
      el.innerHTML = homeData.banners.map((b, i) => `
        <div style="border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:12px;">
          <div class="form-row">
            <div class="form-group" style="margin-bottom:8px;"><label>图片URL</label><input type="text" value="${b.image}" onchange="homeData.banners[${i}].image=this.value"></div>
            <div class="form-group" style="margin-bottom:8px;"><label>标题</label><input type="text" value="${b.title}" onchange="homeData.banners[${i}].title=this.value"></div>
          </div>
          <div class="form-row">
            <div class="form-group" style="margin-bottom:8px;"><label>描述</label><input type="text" value="${b.description}" onchange="homeData.banners[${i}].description=this.value"></div>
            <div class="form-group" style="margin-bottom:8px;"><label>链接</label><input type="text" value="${b.link}" onchange="homeData.banners[${i}].link=this.value"></div>
          </div>
          <button class="btn btn-danger btn-sm" onclick="homeData.banners.splice(${i},1);renderBanners();">删除</button>
        </div>
      `).join('');
    }
    function addBanner() {
      homeData.banners.push({ image: '', title: '', description: '', link: '#' });
      renderBanners();
    }

    function renderCerts() {
      const el = document.getElementById('certsList');
      el.innerHTML = homeData.certificates.map((c, i) => `
        <div style="border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:12px;">
          <div class="form-row">
            <div class="form-group" style="margin-bottom:8px;"><label>图片URL</label><input type="text" value="${c.image}" onchange="homeData.certificates[${i}].image=this.value"></div>
            <div class="form-group" style="margin-bottom:8px;"><label>标题</label><input type="text" value="${c.title}" onchange="homeData.certificates[${i}].title=this.value"></div>
          </div>
          <div class="form-group" style="margin-bottom:8px;"><label>描述</label><input type="text" value="${c.description}" onchange="homeData.certificates[${i}].description=this.value"></div>
          <button class="btn btn-danger btn-sm" onclick="homeData.certificates.splice(${i},1);renderCerts();">删除</button>
        </div>
      `).join('');
    }
    function addCert() {
      homeData.certificates.push({ image: '', title: '', description: '' });
      renderCerts();
    }

    function renderProducts() {
      const el = document.getElementById('productsList');
      el.innerHTML = homeData.products.map((p, i) => `
        <div style="border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:12px;">
          <div class="form-row">
            <div class="form-group" style="margin-bottom:8px;"><label>图标标识</label><input type="text" value="${p.icon}" onchange="homeData.products[${i}].icon=this.value"></div>
            <div class="form-group" style="margin-bottom:8px;"><label>标题</label><input type="text" value="${p.title}" onchange="homeData.products[${i}].title=this.value"></div>
          </div>
          <div class="form-row">
            <div class="form-group" style="margin-bottom:8px;"><label>描述</label><input type="text" value="${p.description}" onchange="homeData.products[${i}].description=this.value"></div>
            <div class="form-group" style="margin-bottom:8px;"><label>链接</label><input type="text" value="${p.link}" onchange="homeData.products[${i}].link=this.value"></div>
          </div>
          <button class="btn btn-danger btn-sm" onclick="homeData.products.splice(${i},1);renderProducts();">删除</button>
        </div>
      `).join('');
    }
    function addProduct() {
      homeData.products.push({ icon: 'cloud', title: '', description: '', link: '#' });
      renderProducts();
    }

    async function saveHome() {
      const res = await apiPost('/api/config/home', homeData);
      showAlert(res.success ? '保存成功' : (res.message || '保存失败'), res.success ? 'success' : 'error');
    }

    // ===== 页脚配置 =====
    async function loadFooter() {
      const res = await apiGet('/api/config/footer');
      if (!res.success) return;
      const d = res.data;
      document.getElementById('footerPhoneInput').value = d.phone || '';
      document.getElementById('footerIcpInput').value = d.icp || '';
      document.getElementById('footerIcpLinkInput').value = d.icpLink || '';
      document.getElementById('footerCertInput').value = d.certificate || '';
      document.getElementById('footerPoliceInput').value = d.police || '';
      document.getElementById('footerPoliceLinkInput').value = d.policeLink || '';
      document.getElementById('footerStatementInput').value = d.statement || '';
    }
    async function saveFooter() {
      const data = {
        phone: document.getElementById('footerPhoneInput').value,
        icp: document.getElementById('footerIcpInput').value,
        icpLink: document.getElementById('footerIcpLinkInput').value,
        certificate: document.getElementById('footerCertInput').value,
        police: document.getElementById('footerPoliceInput').value,
        policeLink: document.getElementById('footerPoliceLinkInput').value,
        statement: document.getElementById('footerStatementInput').value
      };
      const res = await apiPost('/api/config/footer', data);
      showAlert(res.success ? '保存成功' : (res.message || '保存失败'), res.success ? 'success' : 'error');
    }

    // ===== 弹窗配置 =====
    async function loadPopup() {
      const res = await apiGet('/api/config/popup');
      if (!res.success) return;
      const d = res.data;
      document.getElementById('popupEnabled').value = String(d.enabled);
      document.getElementById('popupOncePerDay').value = String(d.oncePerDay);
      document.getElementById('popupHeaderColor').value = d.headerColor || '#0052D9';
      document.getElementById('popupButtonColor').value = d.buttonColor || '#0052D9';
      document.getElementById('popupTitle').value = d.title || '';
      document.getElementById('popupContent').value = d.content || '';
    }
    async function savePopup() {
      const data = {
        enabled: document.getElementById('popupEnabled').value === 'true',
        oncePerDay: document.getElementById('popupOncePerDay').value === 'true',
        headerColor: document.getElementById('popupHeaderColor').value,
        buttonColor: document.getElementById('popupButtonColor').value,
        title: document.getElementById('popupTitle').value,
        content: document.getElementById('popupContent').value
      };
      const res = await apiPost('/api/config/popup', data);
      showAlert(res.success ? '保存成功' : (res.message || '保存失败'), res.success ? 'success' : 'error');
    }

    // ===== 产品管理 =====
    let adminProducts = { products: [] };
    async function loadProducts() {
      const res = await apiGet('/api/config/home');
      if (res.success) adminProducts.products = res.data.products || [];
      renderAdminProducts();
    }
    function renderAdminProducts() {
      const el = document.getElementById('adminProductsList');
      el.innerHTML = adminProducts.products.map((p, i) => `
        <div style="border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:12px;">
          <div class="form-row">
            <div class="form-group" style="margin-bottom:8px;"><label>图标</label><input type="text" value="${p.icon}" onchange="adminProducts.products[${i}].icon=this.value"></div>
            <div class="form-group" style="margin-bottom:8px;"><label>标题</label><input type="text" value="${p.title}" onchange="adminProducts.products[${i}].title=this.value"></div>
          </div>
          <div class="form-row">
            <div class="form-group" style="margin-bottom:8px;"><label>描述</label><input type="text" value="${p.description}" onchange="adminProducts.products[${i}].description=this.value"></div>
            <div class="form-group" style="margin-bottom:8px;"><label>链接</label><input type="text" value="${p.link}" onchange="adminProducts.products[${i}].link=this.value"></div>
          </div>
          <button class="btn btn-danger btn-sm" onclick="adminProducts.products.splice(${i},1);renderAdminProducts();">删除</button>
        </div>
      `).join('');
    }
    function addAdminProduct() {
      adminProducts.products.push({ icon: 'cloud', title: '', description: '', link: '#' });
      renderAdminProducts();
    }
    async function saveProducts() {
      const homeRes = await apiGet('/api/config/home');
      const homeData = homeRes.success ? homeRes.data : {};
      homeData.products = adminProducts.products;
      const res = await apiPost('/api/config/home', homeData);
      showAlert(res.success ? '保存成功' : (res.message || '保存失败'), res.success ? 'success' : 'error');
    }

    // ===== 合作伙伴 =====
    let adminPartners = { partners: [] };
    async function loadPartners() {
      const res = await apiGet('/api/config/partners');
      if (res.success) adminPartners.partners = res.data.partners || [];
      renderAdminPartners();
    }
    function renderAdminPartners() {
      const el = document.getElementById('adminPartnersList');
      el.innerHTML = adminPartners.partners.map((p, i) => `
        <div style="border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:12px;">
          <div class="form-row">
            <div class="form-group" style="margin-bottom:8px;"><label>名称</label><input type="text" value="${p.name}" onchange="adminPartners.partners[${i}].name=this.value"></div>
            <div class="form-group" style="margin-bottom:8px;"><label>Logo URL</label><input type="text" value="${p.logo}" onchange="adminPartners.partners[${i}].logo=this.value"></div>
          </div>
          <div class="form-group" style="margin-bottom:8px;"><label>链接</label><input type="text" value="${p.link}" onchange="adminPartners.partners[${i}].link=this.value"></div>
          <button class="btn btn-danger btn-sm" onclick="adminPartners.partners.splice(${i},1);renderAdminPartners();">删除</button>
        </div>
      `).join('');
    }
    function addAdminPartner() {
      adminPartners.partners.push({ name: '', logo: '', link: '#' });
      renderAdminPartners();
    }
    async function savePartners() {
      const res = await apiPost('/api/config/partners', adminPartners);
      showAlert(res.success ? '保存成功' : (res.message || '保存失败'), res.success ? 'success' : 'error');
    }

    // ===== 地图标记 =====
    let adminMap = { markers: [] };
    async function loadMap() {
      const res = await apiGet('/api/config/map');
      if (res.success) adminMap.markers = res.data.markers || [];
      renderAdminMap();
    }
    function renderAdminMap() {
      const el = document.getElementById('adminMapList');
      el.innerHTML = adminMap.markers.map((m, i) => `
        <div style="border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:12px;">
          <div class="form-row">
            <div class="form-group" style="margin-bottom:8px;"><label>名称</label><input type="text" value="${m.name}" onchange="adminMap.markers[${i}].name=this.value"></div>
            <div class="form-group" style="margin-bottom:8px;"><label>经度</label><input type="number" step="any" value="${m.lng}" onchange="adminMap.markers[${i}].lng=parseFloat(this.value)"></div>
          </div>
          <div class="form-row">
            <div class="form-group" style="margin-bottom:8px;"><label>纬度</label><input type="number" step="any" value="${m.lat}" onchange="adminMap.markers[${i}].lat=parseFloat(this.value)"></div>
            <div class="form-group" style="margin-bottom:8px;"><label>简介</label><input type="text" value="${m.description}" onchange="adminMap.markers[${i}].description=this.value"></div>
          </div>
          <button class="btn btn-danger btn-sm" onclick="adminMap.markers.splice(${i},1);renderAdminMap();">删除</button>
        </div>
      `).join('');
    }
    function addAdminMarker() {
      adminMap.markers.push({ name: '', lng: 0, lat: 0, description: '' });
      renderAdminMap();
    }
    async function saveMap() {
      const res = await apiPost('/api/config/map', adminMap);
      showAlert(res.success ? '保存成功' : (res.message || '保存失败'), res.success ? 'success' : 'error');
    }

    // ===== 修改密码 =====
    async function changePassword() {
      const oldPwd = document.getElementById('oldPassword').value;
      const newPwd = document.getElementById('newPassword').value;
      const confirmPwd = document.getElementById('confirmPassword').value;
      if (!oldPwd || !newPwd) { showAlert('请填写完整', 'error'); return; }
      if (newPwd !== confirmPwd) { showAlert('两次输入的新密码不一致', 'error'); return; }
      const res = await apiPost('/api/admin/password', { oldPassword: oldPwd, newPassword: newPwd });
      showAlert(res.success ? '密码修改成功，请重新登录' : (res.message || '修改失败'), res.success ? 'success' : 'error');
      if (res.success) {
        setTimeout(() => logout(), 1500);
      }
    }

    // 初始加载
    loadHome();
  </script>
</body>
</html>
