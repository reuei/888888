{extend name="layout/main"}

{block name="__CONTENT__"}
<section class="section">
  <div class="container">
    <div class="section-header">
      <h2 class="section-title">商品分类</h2>
      <div style="color:var(--text-secondary);font-size:14px">共 {$goods|count} 件商品</div>
    </div>
    <div class="goods-grid">
      {volist name="goods" id="good"}
      <a href="/goods/{$good.id}" class="goods-card fade-in">
        <div class="goods-image">🎁</div>
        <div class="goods-info">
          <div class="goods-name">{$good.name}</div>
          <div class="goods-price-row">
            <span class="goods-price">{$good.price}</span>
            <span class="goods-sales">已售{$good.sales}+</span>
          </div>
        </div>
      </a>
      {/volist}
    </div>
    <div style="display:flex;justify-content:center;margin-top:40px">
      <div class="pagination">
        <a href="#">上一页</a>
        <span class="current">1</span>
        <a href="#">2</a>
        <a href="#">3</a>
        <a href="#">下一页</a>
      </div>
    </div>
  </div>
</section>
{/block}
