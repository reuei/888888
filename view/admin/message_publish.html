{extend name="layout/admin"}
{php} $current_menu = 'message_publish'; $page_title = '发布消息'; {/php}

{block name="__CONTENT__"}
<div class="card" style="max-width:800px">
  <div class="card-header">
    <h3 class="card-title">发布站内消息</h3>
  </div>
  <div class="card-body">
    <form id="messageForm">
      <div class="form-group">
        <label class="form-label">消息标题</label>
        <input type="text" name="title" class="form-input" placeholder="请输入消息标题">
        <div class="form-error"></div>
      </div>
      <div class="form-group">
        <label class="form-label">接收对象</label>
        <select name="target" class="form-select">
          <option value="all">全体用户</option>
          <option value="new">新用户</option>
          <option value="vip">VIP用户</option>
          <option value="merchant">商家用户</option>
          <option value="custom">指定用户</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">消息内容</label>
        <textarea name="content" class="form-textarea" rows="8" placeholder="请输入消息内容..."></textarea>
        <div class="form-error"></div>
      </div>
      <div style="display:flex;gap:12px">
        <button type="submit" class="btn btn-primary">立即发布</button>
        <button type="button" class="btn btn-secondary">保存草稿</button>
      </div>
    </form>
  </div>
</div>
{/block}
