server {
    listen 80;
    server_name auth.example.com;
    root /www/wwwroot/auth.example.com/public;
    index index.php index.html;

    # удЂТГбУ«┐жЌ«ТЋЈТёЪуЏ«тйЋ
    location ~ ^/(application|runtime|install|\.git|\.env)/ {
        deny all;
        return 403;
    }

    # жЮЎТђЂУхёТ║љ
    location /uploads/ {
        alias /www/wwwroot/auth.example.com/public/uploads/;
        expires 7d;
        access_log off;
    }

    location /css/ {
        alias /www/wwwroot/auth.example.com/public/css/;
        expires 7d;
        access_log off;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}
