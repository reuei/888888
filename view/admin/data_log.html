{extend name="layout/admin"}
{php} $current_menu = 'data_log'; $page_title = '日志管理'; {/php}

{block name="__CONTENT__"}
<div class="card">
  <div class="card-header">
    <h3 class="card-title">系统日志</h3>
    <div style="display:flex;gap:10px">
      <select class="form-select" style="width:120px;padding:6px 10px;font-size:13px">
        <option>全部级别</option>
        <option>info</option>
        <option>warning</option>
        <option>error</option>
      </select>
      <input type="text" placeholder="搜索..." style="padding:6px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;width:180px">
    </div>
  </div>
  <div class="card-body" style="padding:0">
    <table class="table">
      <thead>
        <tr>
          <th style="width:60px">级别</th>
          <th style="width:100px">模块</th>
          <th>日志内容</th>
          <th style="width:120px">IP</th>
          <th style="width:160px">时间</th>
        </tr>
      </thead>
      <tbody>
        {volist name="logs" id="log"}
        <tr>
          <td>
            <span class="badge badge-{$log.level == 'error' ? 'danger' : ($log.level == 'warning' ? 'warning' : 'primary')}">
              {$log.level}
            </span>
          </td>
          <td>{$log.module}</td>
          <td>{$log.message}</td>
          <td style="font-family:monospace;font-size:12px;color:var(--text-muted)">{$log.ip}</td>
          <td style="color:var(--text-muted)">{$log.time}</td>
        </tr>
        {/volist}
      </tbody>
    </table>
  </div>
  <div style="padding:16px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
    <span style="font-size:13px;color:var(--text-secondary)">共 1,234 条记录</span>
    <div class="pagination">
      <a href="#">上一页</a>
      <span class="current">1</span>
      <a href="#">2</a>
      <a href="#">3</a>
      <a href="#">下一页</a>
    </div>
  </div>
</div>
{/block}
