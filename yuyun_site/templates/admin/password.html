<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>修改密码</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
{% include 'admin/_base_style.html' %}
</head>
<body>
<div class="admin-layout">
  {% include 'admin/_sidebar.html' %}
  <main class="admin-main">
    {% include 'admin/_header.html' %}
    <div class="admin-content">
      <div class="tip"><i class="fa-solid fa-circle-info" style="color:#3b82f6"></i> 修改当前管理员登录密码。默认账号：admin / admin123</div>
      <div class="card" style="max-width:500px">
        <h3>修改密码</h3>
        <form method="post">
          <div class="form-row"><label>新密码（至少 4 位）</label><input type="password" name="password" required minlength="4"></div>
          <div class="form-actions">
            <button type="submit" class="admin-btn"><i class="fa-solid fa-key"></i> 修改密码</button>
          </div>
        </form>
      </div>
    </div>
  </main>
</div>
{% include 'admin/_toasts.html' %}
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
