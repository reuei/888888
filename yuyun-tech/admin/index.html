<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>语云科技 - 管理后台</title>
  <link rel="stylesheet" href="../public/assets/css/style.css"/>
  <style>
    body { background: linear-gradient(135deg, #0a2463 0%, #1e5fb0 50%, #00a1d6 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-box { width: 100%; max-width: 420px; background: #fff; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); overflow: hidden; }
    .login-head { background: linear-gradient(135deg, #0a2463, #00a1d6); color: #fff; padding: 40px 30px 36px; text-align: center; }
    .login-head .logo { justify-content: center; color: #fff; }
    .login-head .logo-text { color: #fff; }
    .login-head h2 { font-size: 22px; margin-top: 14px; font-weight: 600; letter-spacing: 1px; }
    .login-head p { font-size: 13px; opacity: 0.85; margin-top: 6px; }
    .login-body { padding: 36px 30px; }
    .login-body .form-group { margin-bottom: 18px; }
    .login-body .form-label { font-size: 13px; color: #333; font-weight: 500; }
    .login-body .form-control { padding: 14px; font-size: 14px; }
    .login-body .btn { width: 100%; padding: 14px; font-size: 15px; margin-top: 10px; }
    .login-tip { text-align: center; margin-top: 16px; font-size: 12px; color: #999; }
    .login-back { position: fixed; top: 20px; left: 20px; color: rgba(255,255,255,0.85); font-size: 14px; }
    .login-back:hover { color: #fff; }
  </style>
</head>
<body>
  <a class="login-back" href="../public/index.html">← 返回官网首页</a>
  <div class="login-box">
    <div class="login-head">
      <div class="logo"><div class="logo-icon" style="background:rgba(255,255,255,0.2);color:#fff;">语</div><div class="logo-text"><span style="color:#ff8a5c;">语云</span>科技</div></div>
      <h2>企业官网管理后台</h2>
      <p>管理您的站点内容、产品与客户信息</p>
    </div>
    <div class="login-body">
      <form id="login-form">
        <div class="form-group"><label class="form-label">管理员账号</label><input class="form-control" id="admin-user" placeholder="请输入管理员账号" value="admin"/></div>
        <div class="form-group"><label class="form-label">密码</label><input class="form-control" id="admin-pass" type="password" placeholder="请输入密码" value="admin123"/></div>
        <button type="submit" class="btn btn-accent btn-lg">登录管理后台</button>
      </form>
      <div class="login-tip">默认账号：admin &nbsp;/&nbsp; 密码：admin123</div>
    </div>
  </div>
  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var u = document.getElementById('admin-user').value.trim();
      var p = document.getElementById('admin-pass').value.trim();
      if (u === 'admin' && p === 'admin123') {
        localStorage.setItem('yuyun_admin_logged', '1');
        window.location.href = 'dashboard.html';
      } else {
        alert('账号或密码错误！默认账号 admin / 密码 admin123');
      }
    });
  </script>
</body>
</html>
