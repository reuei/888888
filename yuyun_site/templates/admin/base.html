<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block admin_title %}管理后台{% endblock %} - {{ s.site_name }}</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
<style>
.admin-layout{display:flex;min-height:100vh;background:#f3f4f6}
.admin-sidebar{width:220px;background:#0f1e36;color:#fff;padding:0;flex-shrink:0}
.admin-sidebar .brand{padding:20px 20px;border-bottom:1px solid rgba(255,255,255,.1);font-size:17px;font-weight:700;color:#ff6a00;display:flex;align-items:center;gap:10px}
.admin-sidebar nav{padding:10px 0}
.admin-sidebar nav a{display:block;padding:12px 20px;color:#cbd5e1;font-size:14px;text-decoration:none;border-left:3px solid transparent;transition:all .15s}
.admin-sidebar nav a:hover,.admin-sidebar nav a.active{background:rgba(255,106,0,.12);color:#ff6a00;border-left-color:#ff6a00}
.admin-main{flex:1;display:flex;flex-direction:column;min-width:0}
.admin-header{background:#fff;padding:14px 30px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #e5e7eb;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.admin-header h2{font-size:18px;color:#0f1e36;margin:0}
.admin-content{padding:30px;flex:1}
.card{background:#fff;border-radius:10px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:20px}
.card h3{font-size:17px;color:#0f1e36;margin:0 0 18px;padding-bottom:10px;border-bottom:2px solid #ff6a00;display:inline-block}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:10px;padding:24px;border-top:3px solid #ff6a00}
.stat-card .label{font-size:13px;color:#6b7280;margin-bottom:8px}
.stat-card .num{font-size:32px;font-weight:700;color:#0f1e36}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:13px;color:#374151;margin-bottom:8px;font-weight:500}
.form-row input,.form-row textarea,.form-row select{padding:10px 12px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;font-family:inherit;width:100%;box-sizing:border-box}
.form-row textarea{min-height:90px;resize:vertical}
.form-actions{margin-top:20px;display:flex;gap:10px}
.admin-btn{padding:10px 24px;border-radius:6px;background:linear-gradient(90deg,#ff8a00,#ff6a00);color:#fff;border:none;font-size:14px;cursor:pointer;font-family:inherit;font-weight:600}
.admin-btn:hover{opacity:.92}
.admin-btn.secondary{background:#374151}
.admin-btn.danger{background:#ef4444}
.admin-btn.small{padding:6px 14px;font-size:13px}
.admin-table{width:100%;border-collapse:collapse;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.admin-table th{background:#f8fafc;padding:12px 14px;text-align:left;font-size:13px;color:#374151;font-weight:600;border-bottom:1px solid #e5e7eb}
.admin-table td{padding:14px;border-bottom:1px solid #f3f4f6;font-size:14px;color:#4b5563;vertical-align:middle}
.admin-table td img{max-height:50px;border-radius:4px}
.row-actions button,.row-actions a{background:none;border:none;color:#ff6a00;font-size:13px;cursor:pointer;padding:0 6px;font-family:inherit}
.row-actions .del{color:#ef4444}
.section-title{font-size:16px;color:#0f1e36;margin:10px 0 14px;font-weight:600}
.badge{display:inline-block;padding:4px 10px;border-radius:4px;background:#fff7f0;color:#ff6a00;font-size:12px}
.tip{background:#eff6ff;padding:14px 18px;border-left:4px solid #3b82f6;border-radius:6px;margin-bottom:20px;font-size:13px;color:#374151}
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.small-text{font-size:12px;color:#6b7280;margin-top:4px}
.danger-btn{background:#ef4444 !important}
@media (max-width:992px){.admin-layout{flex-direction:column}.admin-sidebar{width:100%}.admin-sidebar nav{display:flex;flex-wrap:wrap}.stat-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="brand"><i class="fa-solid fa-cube"></i> {{ s.site_name }} 后台</div>
    <nav>
      <a href="/admin" class="{% if request.path=='/admin' %}active{% endif %}"><i class="fa-solid fa-gauge-high"></i> 仪表盘</a>
      <a href="/admin/settings" class="{% if '/admin/settings' in request.path %}active{% endif %}"><i class="fa-solid fa-gear"></i> 网站设置</a>
      <a href="/admin/sliders" class="{% if '/admin/sliders' in request.path %}active{% endif %}"><i class="fa-solid fa-images"></i> 轮播图管理</a>
      <a href="/admin/products" class="{% if '/admin/products' in request.path %}active{% endif %}"><i class="fa-solid fa-box"></i> 产品管理</a>
      <a href="/admin/offices" class="{% if '/admin/offices' in request.path %}active{% endif %}"><i class="fa-solid fa-map-location-dot"></i> 分支机构</a>
      <a href="/admin/partners" class="{% if '/admin/partners' in request.path %}active{% endif %}"><i class="fa-solid fa-handshake"></i> 合作伙伴</a>
      <a href="/admin/certifications" class="{% if '/admin/certifications' in request.path %}active{% endif %}"><i class="fa-solid fa-award"></i> 资质认证</a>
      <a href="/admin/testimonials" class="{% if '/admin/testimonials' in request.path %}active{% endif %}"><i class="fa-solid fa-star"></i> 用户评价</a>
      <a href="/admin/friendlinks" class="{% if '/admin/friendlinks' in request.path %}active{% endif %}"><i class="fa-solid fa-link"></i> 友情链接</a>
      <a href="/admin/news" class="{% if '/admin/news' in request.path %}active{% endif %}"><i class="fa-solid fa-newspaper"></i> 新闻资讯</a>
      <a href="/admin/password" class="{% if '/admin/password' in request.path %}active{% endif %}"><i class="fa-solid fa-key"></i> 修改密码</a>
      <a href="/"><i class="fa-solid fa-home"></i> 访问网站</a>
      <a href="/admin/logout"><i class="fa-solid fa-right-from-bracket"></i> 退出登录</a>
    </nav>
  </aside>
  <main class="admin-main">
    <div class="admin-header">
      <h2><i class="fa-solid fa-bars" style="color:#ff6a00;margin-right:10px"></i> {{ self.admin_title() }}</h2>
      <div style="font-size:14px;color:#6b7280"><i class="fa-solid fa-user" style="color:#ff6a00"></i> {{ session.get('admin','admin') }} · <a href="/" style="color:#ff6a00;text-decoration:none">查看网站</a> · <a href="/admin/logout" style="color:#ef4444;text-decoration:none">退出</a></div>
    </div>
    <div class="admin-content">
      {% block admin_content %}{% endblock %}
    </div>
  </main>
</div>

{% for cat, msg in get_flashed_messages(with_categories=true) %}
<script>showToast("{{ 'error' if cat=='error' else 'success' }}", "{{ msg }}");</script>
{% endfor %}
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
