; CDN 防护加速平台 - EasyPanel 虚拟主机 PHP 运行时配置
; 此文件会被虚拟主机面板自动加载到当前目录的 PHP 进程

; 显示运行时错误（安装阶段建议开启，安装完成后可关闭）
display_errors = On
display_startup_errors = Off

; 错误日志写入项目内，便于排查
log_errors = On
error_log = runtime/php_errors.log

; 时区
date.timezone = Asia/Shanghai

; 内存与执行时间（导入演示数据或大量记录时需要）
memory_limit = 256M
max_execution_time = 120
max_input_time = 120
max_input_vars = 5000

; 上传限制
post_max_size = 64M
upload_max_filesize = 64M

; 会话配置
session.save_path = runtime/session
session.gc_maxlifetime = 86400

; 关闭安全模式相关限制（若面板允许）
safe_mode = Off

; 关闭自动转义（PHP 8 已废弃，保持兼容）
magic_quotes_gpc = Off
magic_quotes_runtime = Off
