<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>后台登录 - {{ s.site_name }}</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-box" style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f1e36,#1a3a6a);padding:20px">
<form method="post" action="/admin/login" style="background:#fff;padding:40px;border-radius:14px;box-shadow:0 30px 80px rgba(0,0,0,.3);width:400px">
  <div style="text-align:center;margin-bottom:24px">
    <div style="width:72px;height:72px;margin:0 auto 14px;border-radius:18px;background:linear-gradient(135deg,#ff8a00,#ff6a00);color:#fff;display:flex;align-items:center;justify-content:center;font-size:32px"><i class="fa-solid fa-shield-halved"></i></div>
    <h1 style="font-size:24px;color:#0f1e36;margin-bottom:6px">后台管理系统</h1>
    <p style="color:#6b7280;font-size:13px">{{ s.site_name }}</p>
  </div>
  <div style="margin-bottom:14px">
    <label style="display:block;font-size:13px;color:#374151;margin-bottom:8px;font-weight:500">用户名</label>
    <input type="text" name="username" required placeholder="请输入用户名" style="width:100%;padding:12px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;font-family:inherit">
  </div>
  <div style="margin-bottom:20px">
    <label style="display:block;font-size:13px;color:#374151;margin-bottom:8px;font-weight:500">密码</label>
    <input type="password" name="password" required placeholder="请输入密码" style="width:100%;padding:12px;border:1px solid #d1d5db;border-radius:6px;font-size:14px;font-family:inherit">
  </div>
  <button type="submit" class="btn" style="width:100%;padding:13px;background:linear-gradient(90deg,#ff8a00,#ff6a00);color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:15px;font-weight:600">登 录</button>
  <div style="margin-top:20px;padding:12px;background:#f8fafc;border-radius:6px;text-align:center;font-size:12px;color:#6b7280">
    <i class="fa-solid fa-info-circle" style="color:#ff6a00"></i> 默认账号 admin / admin123
  </div>
  <div style="margin-top:14px;text-align:center"><a href="/" style="color:#6b7280;font-size:13px;text-decoration:none">← 返回网站首页</a></div>
</form>
{% for cat, msg in get_flashed_messages(with_categories=true) %}
<script>showToast("{{ 'error' if cat=='error' else 'success' }}", "{{ msg }}");</script>
{% endfor %}
<script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
