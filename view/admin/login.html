<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>后台登录 - {$site_name}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <style>
    body {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #4c1d95 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .admin-login {
      width: 100%;
      max-width: 440px;
      background: rgba(255,255,255,0.98);
      backdrop-filter: blur(20px);
      border-radius: 24px;
      padding: 48px 40px;
      box-shadow: 0 25px 80px rgba(0,0,0,0.3);
    }
    .admin-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .admin-logo-icon {
      width: 60px;
      height: 60px;
      background: var(--gradient-primary);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
      color: white;
      font-size: 28px;
      font-weight: 800;
      box-shadow: 0 10px 30px rgba(99,102,241,0.4);
    }
    .admin-logo h2 {
      font-size: 22px;
      margin-bottom: 4px;
    }
    .admin-logo p {
      color: var(--text-secondary);
      font-size: 13px;
    }
    .form-input {
      height: 48px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .login-btn {
      height: 50px;
      font-size: 16px;
      margin-top: 8px;
    }
    .form-footer {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 13px;
    }
    .form-footer a {
      color: var(--primary);
    }
  </style>
</head>
<body>
  <div class="page-loader" id="pageLoader">
    <div class="loader-content">
      <div class="loader-spinner"></div>
      <div class="loader-text">加载中...</div>
    </div>
  </div>

  <div class="admin-login">
    <div class="admin-logo">
      <div class="admin-logo-icon">玄</div>
      <h2>管理后台</h2>
      <p>{$site_name} 管理系统 v{$site_version}</p>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">管理员账号</label>
        <input type="text" name="username" class="form-input" placeholder="请输入管理员账号" autocomplete="username">
        <div class="form-error"></div>
      </div>

      <div class="form-group">
        <label class="form-label">密码</label>
        <input type="password" name="password" class="form-input" placeholder="请输入密码" autocomplete="current-password">
        <div class="form-error"></div>
      </div>

      <div class="form-group">
        <label class="form-label">安全验证</label>
        <div class="slider-captcha" id="sliderCaptcha">
          <div class="slider-track">
            <div class="slider-fill"></div>
            <div class="slider-btn">→</div>
            <div class="slider-text">向右滑动完成验证</div>
          </div>
        </div>
      </div>

      <div class="form-footer">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer">
          <input type="checkbox" name="remember"> 记住登录
        </label>
        <a href="/">返回首页</a>
      </div>

      <button type="submit" class="btn btn-primary btn-block login-btn" id="loginBtn">登 录</button>
    </form>
  </div>

  <script src="/static/js/app.js"></script>
  <script>
    let sliderVerified = false;
    let sliderToken = '';

    App.initSliderCaptcha('#sliderCaptcha', function(token) {
      sliderVerified = true;
      sliderToken = token;
    });

    const rules = {
      username: {
        required: true,
        minLength: 3,
        message: '请输入管理员账号'
      },
      password: {
        required: true,
        minLength: 6,
        message: '请输入密码'
      }
    };

    App.initLiveValidation('#loginForm', rules);

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      
      if (!App.validateForm('#loginForm', rules)) return;
      if (!sliderVerified) {
        App.toastError('请先完成安全验证');
        return;
      }

      App.setButtonLoading(btn, true);
      const formData = new FormData(e.target);
      const data = {};
      formData.forEach((v, k) => data[k] = v);
      data.slider_token = sliderToken;
      data.slider_x = 1;

      const result = await App.post('/admin/login', data);
      App.setButtonLoading(btn, false);

      if (result.code === 0) {
        App.toastSuccess('登录成功');
        setTimeout(() => {
          window.location.href = result.data?.url || '/admin';
        }, 800);
      } else {
        App.toastError(result.msg);
        if (result.msg.includes('验证')) {
          document.querySelector('#sliderCaptcha').refresh?.();
          sliderVerified = false;
        }
      }
    });
  </script>
</body>
</html>
